    <div class="section" id="contato">

        <div class="contact-form-container">
            <h2>Entre em Contato </h2>
            <form action="https://formspree.io/f/mwpkdklj" method="POST">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" placeholder="Seu nome" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Seu e-mail" required>

                <label for="subject">Assunto:</label>
                <input type="text" id="subject" name="subject" placeholder="Assunto (opcional)">

                <label for="message">Mensagem:</label>
                <textarea id="message" name="message" placeholder="Sua mensagem" required></textarea>

                <button type="submit">Enviar</button>
            </form>

            <div class="form-feedback" id="form-feedback"></div>
        </div>
